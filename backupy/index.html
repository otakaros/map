<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Interaktivní mapa obce Bolatice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-measure/dist/leaflet-measure.css"/>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222536;
    --border: #2e3248;
    --accent: #4f8ef7;
    --accent2: #7c5cf6;
    --text: #e8eaf2;
    --muted: #8890aa;
    --gastro: #f97316;
    --sport: #22c55e;
    --urad: #4f8ef7;
    --sluzby: #a855f7;
    --radius: 12px;
    --shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 56px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    z-index: 1000;
    flex-shrink: 0;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.1rem;
    letter-spacing: -0.5px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-dot {
    width: 10px; height: 10px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.8); }
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn-icon {
    width: 36px; height: 36px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    transition: all 0.2s;
  }
  .btn-icon:hover, .btn-icon.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* MAP */
  #map {
    flex: 1;
    z-index: 1;
  }

  /* SIDEBAR */
  #sidebar {
    position: absolute;
    top: 56px;
    left: 0;
    bottom: 0;
    width: 300px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    z-index: 900;
    display: flex;
    flex-direction: column;
    transform: translateX(0);
    transition: transform 0.3s ease;
    overflow: hidden;
  }

  #sidebar.collapsed { transform: translateX(-100%); }

  .sidebar-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .sidebar-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  /* SEARCH */
  .search-wrap {
    position: relative;
    margin-bottom: 12px;
  }

  .search-wrap input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px 9px 36px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }

  .search-icon {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 0.9rem;
    pointer-events: none;
  }

  /* FILTER CATEGORIES */
  .filter-section { margin-bottom: 6px; }

  .filter-cat {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
    user-select: none;
  }
  .filter-cat:hover { background: var(--surface2); }
  .filter-cat.active { background: var(--surface2); }

  .cat-indicator {
    width: 12px; height: 12px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .cat-label {
    font-size: 0.9rem;
    font-weight: 500;
    flex: 1;
  }

  .cat-count {
    font-size: 0.75rem;
    color: var(--muted);
    background: var(--bg);
    padding: 2px 7px;
    border-radius: 20px;
  }

  .cat-arrow {
    color: var(--muted);
    font-size: 0.75rem;
    transition: transform 0.2s;
  }
  .filter-cat.open .cat-arrow { transform: rotate(90deg); }

  .cat-toggle {
    width: 32px; height: 18px;
    background: var(--border);
    border-radius: 9px;
    position: relative;
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .cat-toggle.on { background: var(--accent); }
  .cat-toggle::after {
    content: '';
    position: absolute;
    width: 14px; height: 14px;
    background: #fff;
    border-radius: 50%;
    top: 2px; left: 2px;
    transition: left 0.2s;
  }
  .cat-toggle.on::after { left: 16px; }

  /* SUBCATEGORIES */
  .sub-list {
    display: none;
    padding: 4px 0 4px 34px;
  }
  .sub-list.open { display: block; }

  .sub-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.82rem;
    color: var(--muted);
    transition: all 0.15s;
  }
  .sub-item:hover { background: var(--surface2); color: var(--text); }
  .sub-item.active { color: var(--text); }

  .sub-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .sub-toggle {
    margin-left: auto;
    width: 24px; height: 14px;
    background: var(--border);
    border-radius: 7px;
    position: relative;
    transition: background 0.2s;
  }
  .sub-toggle.on { background: var(--accent2); }
  .sub-toggle::after {
    content: '';
    position: absolute;
    width: 10px; height: 10px;
    background: #fff;
    border-radius: 50%;
    top: 2px; left: 2px;
    transition: left 0.2s;
  }
  .sub-toggle.on::after { left: 12px; }

  /* RESULTS LIST */
  .results-header {
    padding: 10px 20px 6px;
    font-size: 0.75rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    margin-top: 4px;
  }

  #results-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 12px 12px;
  }

  #results-list::-webkit-scrollbar { width: 4px; }
  #results-list::-webkit-scrollbar-track { background: transparent; }
  #results-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .result-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
    margin-bottom: 2px;
  }
  .result-item:hover { background: var(--surface2); }

  .result-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    flex-shrink: 0;
  }

  .result-info { flex: 1; min-width: 0; }
  .result-name {
    font-size: 0.85rem;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .result-sub {
    font-size: 0.72rem;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* POPUP */
  .leaflet-popup-content-wrapper {
    background: var(--surface) !important;
    border: 1px solid var(--border) !important;
    border-radius: var(--radius) !important;
    box-shadow: var(--shadow) !important;
    color: var(--text) !important;
    padding: 0 !important;
    min-width: 240px;
    max-width: 280px;
  }

  .leaflet-popup-tip { background: var(--surface) !important; }
  .leaflet-popup-content { margin: 0 !important; padding: 0 !important; width: auto !important; }
  .leaflet-popup-close-button { color: var(--muted) !important; top: 10px !important; right: 10px !important; font-size: 18px !important; }

  .popup-inner { padding: 18px 18px 14px; }

  .popup-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 4px;
    margin-bottom: 8px;
  }

  .popup-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    line-height: 1.3;
    margin-bottom: 10px;
    padding-right: 16px;
  }

  .popup-divider {
    height: 1px;
    background: var(--border);
    margin: 10px 0;
  }

  .popup-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 7px;
    font-size: 0.8rem;
  }

  .popup-row-icon {
    color: var(--muted);
    width: 14px;
    margin-top: 1px;
    flex-shrink: 0;
    text-align: center;
  }

  .popup-row-val { color: var(--text); }
  .popup-row-val a { color: var(--accent); text-decoration: none; }
  .popup-row-val a:hover { text-decoration: underline; }

  .popup-footer {
    padding: 10px 18px 14px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 6px;
  }

  .popup-btn {
    flex: 1;
    padding: 7px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }
  .popup-btn:hover { background: var(--accent); border-color: var(--accent); }

  /* SIDEBAR TOGGLE */
  #sidebar-toggle {
    position: absolute;
    top: 66px;
    left: 308px;
    z-index: 1000;
    width: 28px; height: 28px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 0 6px 6px 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 0.75rem;
    transition: left 0.3s;
  }
  #sidebar-toggle.collapsed { left: 8px; }
  #sidebar-toggle:hover { color: var(--text); }

  /* MAP CONTROLS */
  .leaflet-control-zoom {
    border: 1px solid var(--border) !important;
    border-radius: var(--radius) !important;
    overflow: hidden;
    box-shadow: var(--shadow) !important;
  }
  .leaflet-control-zoom a {
    background: var(--surface) !important;
    color: var(--text) !important;
    border-color: var(--border) !important;
    width: 36px !important;
    height: 36px !important;
    line-height: 36px !important;
    font-size: 1.1rem !important;
  }
  .leaflet-control-zoom a:hover { background: var(--surface2) !important; }

  /* SCALE */
  .leaflet-control-scale-line {
    background: var(--surface) !important;
    border: 1px solid var(--accent) !important;
    border-top: none !important;
    color: var(--text) !important;
    font-family: 'DM Sans', sans-serif !important;
    font-size: 10px !important;
    padding: 2px 6px !important;
    border-radius: 0 0 4px 4px !important;
  }

  /* MEASURE */
  .leaflet-measure-resultpopup {
    background: var(--surface) !important;
    border: 1px solid var(--border) !important;
    border-radius: var(--radius) !important;
    color: var(--text) !important;
  }

  .leaflet-bar a.leaflet-measure-action {
    background: var(--surface) !important;
    color: var(--text) !important;
    font-size: 0.75rem !important;
  }

  /* GEOLOCATION BTN */
  #geolocate-btn {
    position: absolute;
    bottom: 100px;
    right: 12px;
    z-index: 900;
    width: 36px; height: 36px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    color: var(--muted);
    box-shadow: var(--shadow);
    transition: all 0.2s;
  }
  #geolocate-btn:hover, #geolocate-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* MEASURE BTN */
  #measure-btn {
    position: absolute;
    bottom: 146px;
    right: 12px;
    z-index: 900;
    width: 36px; height: 36px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    color: var(--muted);
    box-shadow: var(--shadow);
    transition: all 0.2s;
  }
  #measure-btn:hover, #measure-btn.active { background: var(--accent2); color: #fff; border-color: var(--accent2); }

  /* TILE SWITCHER */
  #tile-btn {
    position: absolute;
    bottom: 192px;
    right: 12px;
    z-index: 900;
    width: 36px; height: 36px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    color: var(--muted);
    box-shadow: var(--shadow);
    transition: all 0.2s;
  }
  #tile-btn:hover { background: var(--surface2); color: var(--text); }

  /* STATS BAR */
  #stats-bar {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 900;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 16px;
    display: flex;
    gap: 16px;
    font-size: 0.72rem;
    color: var(--muted);
    box-shadow: var(--shadow);
  }

  .stat-item { display: flex; align-items: center; gap: 5px; }
  .stat-dot { width: 7px; height: 7px; border-radius: 50%; }

  /* LOADING */
  #loading {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--bg);
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    transition: opacity 0.5s;
  }

  #loading.hide { opacity: 0; pointer-events: none; }

  .loader-ring {
    width: 48px; height: 48px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loader-text {
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* MEASURE PANEL */
  #measure-panel {
    display: none;
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 900;
    background: var(--surface);
    border: 1px solid var(--accent2);
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 0.8rem;
    color: var(--text);
    box-shadow: var(--shadow);
    text-align: center;
    min-width: 200px;
  }
  #measure-panel.active { display: block; }
  #measure-result { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--accent2); }

  /* MOBILE */
  @media (max-width: 640px) {
    #sidebar { width: 100%; max-width: 320px; }
    #sidebar-toggle { display: none; }
    header { padding: 0 12px; }
    .logo span { display: none; }
    #stats-bar { display: none; }
  }
</style>
</head>
<body>

<div id="loading">
  <div class="loader-ring"></div>
  <div class="loader-text">Načítám mapu Bolatice…</div>
</div>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    <span>Bolatice</span>
    <span style="font-weight:400;color:var(--muted);font-size:0.85rem;margin-left:2px;">/ interaktivní mapa</span>
  </div>
  <div class="header-right">
    <button class="btn-icon" id="toggle-sidebar-btn" title="Filtr" onclick="toggleSidebar()">☰</button>
  </div>
</header>

<div id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-title">Filtr & Vyhledávání</div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="Hledat místo…" oninput="filterSearch(this.value)">
    </div>
  </div>

  <div style="padding: 10px 12px 4px; flex-shrink:0;">
    <!-- GASTRO -->
    <div class="filter-section">
      <div class="filter-cat" id="cat-gastro" onclick="toggleCat('gastro')">
        <div class="cat-indicator" style="background:var(--gastro)"></div>
        <span class="cat-label">Gastro</span>
        <span class="cat-count" id="count-gastro">0</span>
        <div class="cat-toggle on" id="tog-gastro"></div>
      </div>
    </div>
    <!-- SPORT -->
    <div class="filter-section">
      <div class="filter-cat" id="cat-sport" onclick="toggleCat('sport')">
        <div class="cat-indicator" style="background:var(--sport)"></div>
        <span class="cat-label">Sport</span>
        <span class="cat-count" id="count-sport">0</span>
        <div class="cat-toggle on" id="tog-sport"></div>
      </div>
    </div>
    <!-- URAD -->
    <div class="filter-section">
      <div class="filter-cat" id="cat-urad" onclick="toggleCat('urad')">
        <div class="cat-indicator" style="background:var(--urad)"></div>
        <span class="cat-label">Úřady & Instituce</span>
        <span class="cat-count" id="count-urad">0</span>
        <div class="cat-toggle on" id="tog-urad"></div>
      </div>
    </div>
    <!-- SLUZBY with subcategories -->
    <div class="filter-section">
      <div class="filter-cat" id="cat-sluzby" onclick="toggleSubList()">
        <div class="cat-indicator" style="background:var(--sluzby)"></div>
        <span class="cat-label">Služby</span>
        <span class="cat-count" id="count-sluzby">0</span>
        <span class="cat-arrow" id="arrow-sluzby">▶</span>
        <div class="cat-toggle on" id="tog-sluzby" onclick="event.stopPropagation();toggleCat('sluzby')"></div>
      </div>
      <div class="sub-list" id="sub-sluzby">
        <!-- dynamically filled -->
      </div>
    </div>
  </div>

  <div class="results-header" id="results-header">Výsledky — <span id="results-count">0</span></div>
  <div id="results-list"></div>
</div>

<div id="sidebar-toggle" onclick="toggleSidebar()">◀</div>

<div id="map"></div>

<button id="geolocate-btn" title="Moje poloha" onclick="geolocate()">📍</button>
<button id="measure-btn" title="Měření vzdálenosti" onclick="toggleMeasure()">📏</button>
<button id="tile-btn" title="Přepnout podkladovou mapu" onclick="switchTile()">🗺</button>

<div id="measure-panel">
  <div style="color:var(--muted);font-size:0.72rem;margin-bottom:4px;">DÉLKA TRASY</div>
  <div id="measure-result">0 m</div>
  <div style="color:var(--muted);font-size:0.7rem;margin-top:4px;">Klikejte na body • dvojklik pro ukončení</div>
  <button onclick="clearMeasure()" style="margin-top:6px;padding:4px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);cursor:pointer;font-size:0.75rem;">Vymazat</button>
</div>

<div id="stats-bar">
  <div class="stat-item"><div class="stat-dot" style="background:var(--gastro)"></div><span id="s-gastro">0 gastro</span></div>
  <div class="stat-item"><div class="stat-dot" style="background:var(--sport)"></div><span id="s-sport">0 sport</span></div>
  <div class="stat-item"><div class="stat-dot" style="background:var(--urad)"></div><span id="s-urad">0 úřadů</span></div>
  <div class="stat-item"><div class="stat-dot" style="background:var(--sluzby)"></div><span id="s-sluzby">0 služeb</span></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ============================================================
//  KONFIGURACE KATEGORIÍ
//  → Zde snadno přidáš nové kategorie nebo podkategorie
// ============================================================
const CATEGORY_CONFIG = {
  gastro: {
    label: 'Gastro',
    color: '#f97316',
    icon: '🍽️',
    subcategories: null
  },
  sport: {
    label: 'Sport',
    color: '#22c55e',
    icon: '⚽',
    subcategories: null
  },
  urad: {
    label: 'Úřady & Instituce',
    color: '#4f8ef7',
    icon: '🏛️',
    subcategories: null
  },
  sluzby: {
    label: 'Služby',
    color: '#a855f7',
    icon: '🔧',
    subcategories: {
      kadernictvi:  { label: 'Kadeřnictví',  icon: '✂️',  color: '#c084fc' },

// ============================================================
//  ICONS
// ============================================================
function makeIcon(emoji, color, size = 36) {
  const s = size;
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${s+8}" viewBox="0 0 ${s} ${s+8}">
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="${color}" flood-opacity="0.5"/></filter>
    <circle cx="${s/2}" cy="${s/2}" r="${s/2-2}" fill="${color}" filter="url(#sh)" opacity="0.95"/>
    <circle cx="${s/2}" cy="${s/2}" r="${s/2-5}" fill="rgba(255,255,255,0.12)"/>
    <text x="${s/2}" y="${s/2+5}" text-anchor="middle" font-size="${s*0.4}">${emoji}</text>
    <line x1="${s/2}" y1="${s-2}" x2="${s/2}" y2="${s+6}" stroke="${color}" stroke-width="2" opacity="0.6"/>
  </svg>`;
  return L.divIcon({
    html: svg,
    className: '',
    iconSize: [s, s+8],
    iconAnchor: [s/2, s+8],
    popupAnchor: [0, -(s+8)]
  });
}

// ============================================================
//  STATE
// ============================================================
const state = {
  features: [],
  markers: [],
  catActive: { gastro: true, sport: true, urad: true, sluzby: true },
  subActive: {},
  searchQ: ''
};

// ============================================================
//  BUILD SUBCATEGORY UI
// ============================================================
function buildSubUI() {
  const cfg = CATEGORY_CONFIG.sluzby.subcategories;
  const container = document.getElementById('sub-sluzby');
  container.innerHTML = '';
  for (const [key, sub] of Object.entries(cfg)) {
    state.subActive[key] = true;
    const div = document.createElement('div');
    div.className = 'sub-item active';
    div.id = 'sub-item-' + key;
    div.innerHTML = `
      <div class="sub-dot" style="background:${sub.color}"></div>
      <span>${sub.icon} ${sub.label}</span>
      <div class="sub-toggle on" id="sub-tog-${key}"></div>`;
    div.onclick = () => toggleSub(key);
    container.appendChild(div);
  }
}

function toggleSubList() {
  const list = document.getElementById('sub-sluzby');
  const arrow = document.getElementById('arrow-sluzby');
  const cat = document.getElementById('cat-sluzby');
  list.classList.toggle('open');
  cat.classList.toggle('open');
}

// ============================================================
//  LOAD DATA
// ============================================================
async function loadData() {
  let geojson;

  // TRY LOADING FROM FILE — fallback to demo
  try {
    const resp = await fetch('data/bzdoovy1.geojson');
    if (resp.ok) {
      geojson = await resp.json();
      console.log('✅ GeoJSON načten ze souboru');
    } else throw new Error('not found');
  } catch(e) {
    console.warn('⚠️ GeoJSON soubor nenalezen, použita ukázková data.');
    geojson = DEMO_GEOJSON;
  }

  processGeoJSON(geojson);
}

function processGeoJSON(geojson) {
  state.features = geojson.features.filter(f => f.geometry && f.geometry.type === 'Point');

  // Collect subcategories dynamically from data
  state.features.forEach(f => {
    const p = f.properties;
    if (p.kategorie === 'sluzby' && p.podkategorie) {
      if (!CATEGORY_CONFIG.sluzby.subcategories[p.podkategorie]) {
        CATEGORY_CONFIG.sluzby.subcategories[p.podkategorie] = {
          label: p.podkategorie,
          icon: '⚙️',
          color: '#cbd5e1'
        };
      }
      if (state.subActive[p.podkategorie] === undefined) {
        state.subActive[p.podkategorie] = true;
      }
    }
  });

  buildSubUI();
  renderMarkers();
  updateCounts();
  updateResultsList();
  updateStats();
}

// ============================================================
//  MARKERS
// ============================================================
function renderMarkers() {
  state.markers.forEach(m => map.removeLayer(m));
  state.markers = [];

  state.features.forEach((f, idx) => {
    const p = f.properties;
    const [lng, lat] = f.geometry.coordinates;
    const cat = CATEGORY_CONFIG[p.kategorie];
    if (!cat) return;

    // Visibility check
    if (!state.catActive[p.kategorie]) return;
    if (p.kategorie === 'sluzby' && p.podkategorie && !state.subActive[p.podkategorie]) return;

    // Search filter
    if (state.searchQ) {
      const q = state.searchQ.toLowerCase();
      const match = (p.nazev||'').toLowerCase().includes(q) ||
                    (p.adresa||'').toLowerCase().includes(q) ||
                    (p.typ||'').toLowerCase().includes(q);
      if (!match) return;
    }

    // Sub color
    let color = cat.color;
    let icon = cat.icon;
    if (p.kategorie === 'sluzby' && p.podkategorie && CATEGORY_CONFIG.sluzby.subcategories[p.podkategorie]) {
      color = CATEGORY_CONFIG.sluzby.subcategories[p.podkategorie].color;
      icon = CATEGORY_CONFIG.sluzby.subcategories[p.podkategorie].icon;
    }

    const marker = L.marker([lat, lng], { icon: makeIcon(icon, color) });
    marker.feature = f;
    marker.bindPopup(buildPopup(p, color, icon));
    marker.on('click', () => {
      highlightResult(idx);
    });
    marker.addTo(map);
    state.markers.push(marker);
  });
}

// ============================================================
//  POPUP
// ============================================================
function buildPopup(p, color, icon) {
  const cat = CATEGORY_CONFIG[p.kategorie];
  const catLabel = cat ? cat.label : p.kategorie;
  const typLabel = p.typ || catLabel;

  let rows = '';
  if (p.adresa) rows += `<div class="popup-row"><div class="popup-row-icon">📍</div><div class="popup-row-val">${p.adresa}</div></div>`;
  if (p.tel) rows += `<div class="popup-row"><div class="popup-row-icon">📞</div><div class="popup-row-val"><a href="tel:${p.tel}">${p.tel}</a></div></div>`;
  if (p.web) rows += `<div class="popup-row"><div class="popup-row-icon">🌐</div><div class="popup-row-val"><a href="${p.web}" target="_blank">${p.web.replace(/https?:\/\//,'')}</a></div></div>`;
  if (p.popis) rows += `<div class="popup-row"><div class="popup-row-icon">ℹ️</div><div class="popup-row-val">${p.popis}</div></div>`;

  return `<div class="popup-inner">
    <div class="popup-badge" style="background:${color}22;color:${color};">${icon} ${typLabel}</div>
    <div class="popup-name">${p.nazev || 'Bez názvu'}</div>
    ${rows ? `<div class="popup-divider"></div>${rows}` : ''}
  </div>
  <div class="popup-footer">
    <button class="popup-btn" onclick="navigateTo(${p.lat||0},${p.lng||0},'${(p.nazev||'').replace(/'/g,"\\'")}')">🗺 Trasa</button>
    ${p.web ? `<button class="popup-btn" onclick="window.open('${p.web}','_blank')">🌐 Web</button>` : ''}
  </div>`;
}

function navigateTo(lat, lng, name) {
  // Open in Google Maps / Apple Maps
  const url = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;
  window.open(url, '_blank');
}

// ============================================================
//  COUNTS & RESULTS
// ============================================================
function updateCounts() {
  const counts = { gastro: 0, sport: 0, urad: 0, sluzby: 0 };
  state.features.forEach(f => {
    const k = f.properties.kategorie;
    if (counts[k] !== undefined) counts[k]++;
  });
  for (const [k, v] of Object.entries(counts)) {
    const el = document.getElementById('count-' + k);
    if (el) el.textContent = v;
  }
}

function updateStats() {
  const counts = { gastro: 0, sport: 0, urad: 0, sluzby: 0 };
  state.features.forEach(f => {
    const k = f.properties.kategorie;
    if (counts[k] !== undefined) counts[k]++;
  });
  document.getElementById('s-gastro').textContent = `${counts.gastro} gastro`;
  document.getElementById('s-sport').textContent = `${counts.sport} sport`;
  document.getElementById('s-urad').textContent = `${counts.urad} úřadů`;
  document.getElementById('s-sluzby').textContent = `${counts.sluzby} služeb`;
}

function updateResultsList() {
  const list = document.getElementById('results-list');
  list.innerHTML = '';

  const visible = state.features.filter((f, idx) => {
    const p = f.properties;
    if (!state.catActive[p.kategorie]) return false;
    if (p.kategorie === 'sluzby' && p.podkategorie && !state.subActive[p.podkategorie]) return false;
    if (state.searchQ) {
      const q = state.searchQ.toLowerCase();
      const match = (p.nazev||'').toLowerCase().includes(q) ||
                    (p.adresa||'').toLowerCase().includes(q) ||
                    (p.typ||'').toLowerCase().includes(q);
      if (!match) return false;
    }
    return true;
  });

  document.getElementById('results-count').textContent = visible.length;

  visible.forEach(f => {
    const p = f.properties;
    const cat = CATEGORY_CONFIG[p.kategorie];
    let color = cat ? cat.color : '#888';
    let icon = cat ? cat.icon : '📍';
    if (p.kategorie === 'sluzby' && p.podkategorie && CATEGORY_CONFIG.sluzby.subcategories[p.podkategorie]) {
      color = CATEGORY_CONFIG.sluzby.subcategories[p.podkategorie].color;
      icon = CATEGORY_CONFIG.sluzby.subcategories[p.podkategorie].icon;
    }
    const [lng, lat] = f.geometry.coordinates;

    const div = document.createElement('div');
    div.className = 'result-item';
    div.innerHTML = `
      <div class="result-icon" style="background:${color}22">${icon}</div>
      <div class="result-info">
        <div class="result-name">${p.nazev || 'Bez názvu'}</div>
        <div class="result-sub">${p.typ || cat?.label || ''} ${p.adresa ? '· ' + p.adresa : ''}</div>
      </div>`;
    div.onclick = () => {
      map.setView([lat, lng], 17);
      state.markers.forEach(m => {
        const mp = m.feature?.properties;
        if (mp && mp.nazev === p.nazev) m.openPopup();
      });
    };
    list.appendChild(div);
  });
}

function highlightResult(idx) {}

//  FILTER TOGGLES
// ============================================================
function toggleCat(key) {
  state.catActive[key] = !state.catActive[key];
  const tog = document.getElementById('tog-' + key);

  if (tog) tog.classList.toggle('on', state.subActive[key]);

  renderMarkers();
  updateResultsList();
}

function filterSearch(q) {
  state.searchQ = q.trim();
  renderMarkers();
  updateResultsList();
}

// ============================================================
//  GEOLOCATION
// ============================================================
let geoMarker = null;
function geolocate() {
  const btn = document.getElementById('geolocate-btn');
  if (!navigator.geolocation) { alert('Geolokace není podporována.'); return; }

  btn.classList.add('active');
  navigator.geolocation.getCurrentPosition(pos => {
    const { latitude: lat, longitude: lng } = pos.coords;
    if (geoMarker) map.removeLayer(geoMarker);
    const geoIcon = L.divIcon({
      html: `<div style="width:16px;height:16px;background:#4f8ef7;border:3px solid #fff;border-radius:50%;box-shadow:0 0 12px #4f8ef7;"></div>`,
      className: '',
      iconSize: [16,16],
      iconAnchor: [8,8]
    });
    geoMarker = L.marker([lat, lng], { icon: geoIcon })
      .addTo(map)
      .bindPopup('<div style="font-family:DM Sans;background:#1a1d27;color:#e8eaf2;padding:8px 12px;border-radius:8px;font-size:0.8rem;">📍 Vaše poloha</div>');
    map.setView([lat, lng], 16);
    L.circle([lat, lng], { radius: pos.coords.accuracy, color: '#4f8ef7', fillColor: '#4f8ef7', fillOpacity: 0.1, weight: 1 }).addTo(map);
    btn.classList.remove('active');
  }, err => {
    btn.classList.remove('active');
    alert('Nelze získat polohu: ' + err.message);
  });
}

// ============================================================
//  MEASURE DISTANCE
// ============================================================
let measuring = false;
let measurePoints = [];
let measureLines = [];
let measureMarkers = [];

function toggleMeasure() {
  measuring = !measuring;
  const btn = document.getElementById('measure-btn');
  const panel = document.getElementById('measure-panel');
  btn.classList.toggle('active', measuring);
  panel.classList.toggle('active', measuring);

  if (measuring) {
    map.getContainer().style.cursor = 'crosshair';
    map.on('click', onMeasureClick);
    map.on('dblclick', onMeasureDblClick);
  } else {
    clearMeasure();
  }
}

function onMeasureClick(e) {
  if (!measuring) return;
  measurePoints.push(e.latlng);

  const dot = L.circleMarker(e.latlng, {
    radius: 5, color: '#7c5cf6', fillColor: '#7c5cf6', fillOpacity: 1, weight: 2
  }).addTo(map);
  measureMarkers.push(dot);

  if (measurePoints.length > 1) {
    const line = L.polyline(measurePoints, { color: '#7c5cf6', weight: 2, dashArray: '6,4' }).addTo(map);
    measureLines.push(line);
    updateMeasureResult();
  }
}

function onMeasureDblClick(e) {
  updateMeasureResult();
  map.off('click', onMeasureClick);
  map.off('dblclick', onMeasureDblClick);
  measuring = false;
  document.getElementById('measure-btn').classList.remove('active');
  map.getContainer().style.cursor = '';
}

function updateMeasureResult() {
  let total = 0;
  for (let i = 1; i < measurePoints.length; i++) {
    total += measurePoints[i-1].distanceTo(measurePoints[i]);
  }
  const display = total >= 1000
    ? `${(total/1000).toFixed(2)} km`
    : `${Math.round(total)} m`;
  document.getElementById('measure-result').textContent = display;
}

function clearMeasure() {
  measurePoints = [];
  measureLines.forEach(l => map.removeLayer(l));
  measureLines = [];
  measureMarkers.forEach(m => map.removeLayer(m));
  measureMarkers = [];
  document.getElementById('measure-result').textContent = '0 m';
  if (!measuring) {
    map.off('click', onMeasureClick);
    map.off('dblclick', onMeasureDblClick);
    map.getContainer().style.cursor = '';
    document.getElementById('measure-panel').classList.remove('active');
  }
}

  await loadData();
